# CI pipeline.
#
#   check     — typecheck + SSR build. Always runs. No secrets.
#   db-tests  — structural + behavioral RLS harnesses (IMPL-0004 Phase 1).
#               Gates on env presence via a step-level check because GitHub
#               Actions does NOT permit `secrets.*` in job-level `if:`
#               conditionals.
#
# Middleware harness (scripts/middleware-tests.mjs) is intentionally not
# wired in — it needs a running `astro dev` server, which requires
# backgrounding a process and waiting on port readiness inside the runner.
# See IMPL-0004 §3.3 + D8 (deferred to follow-up).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Typecheck + Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Build
        run: npm run build

  db-tests:
    name: Structural + Behavioral RLS
    runs-on: ubuntu-latest
    needs: check

    # Secrets cannot be referenced in `if:` at the job level. The gate step
    # below checks env presence and short-circuits remaining steps if missing.
    env:
      POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
      SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY:         ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_JWT_SECRET:       ${{ secrets.SUPABASE_JWT_SECRET }}
      CSRF_SECRET:               ${{ secrets.CSRF_SECRET }}
      IDENTITY_HASH_PEPPER:      ${{ secrets.IDENTITY_HASH_PEPPER }}

    steps:
      - name: Gate on DB env presence
        id: env-gate
        shell: bash
        run: |
          missing=""
          for k in POSTGRES_URL_NON_POOLING SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY SUPABASE_JWT_SECRET SUPABASE_ANON_KEY; do
            if [ -z "${!k}" ]; then missing="$missing $k"; fi
          done
          if [ -n "$missing" ]; then
            echo "::warning::Missing DB env on this runner:$missing — skipping DB-dependent tests"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.env-gate.outputs.skip != 'true'
        uses: actions/checkout@v4

      - if: steps.env-gate.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - if: steps.env-gate.outputs.skip != 'true'
        name: Install dependencies
        run: npm ci

      - if: steps.env-gate.outputs.skip != 'true'
        name: Structural (phase2-tests)
        run: node scripts/phase2-tests.mjs

      - if: steps.env-gate.outputs.skip != 'true'
        name: Behavioral RLS (rls-behavior-tests)
        run: node scripts/rls-behavior-tests.mjs
